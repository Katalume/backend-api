name: Keep the live backend warm

# The free-tier backend spins down after idle, so the first visitor eats a
# ~60s cold start (login and problem lists appear broken). Pinging through the
# public site's own API gateway every 10 minutes keeps the service resident.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the API through the public gateway
        run: |
          # /auth/providers boots the server; /problems also warms the DB pool.
          # Never fail the run - a cold start can exceed the first timeout and
          # the next tick will land warm.
          curl -sS -m 90 -o /dev/null -w "providers: %{http_code} in %{time_total}s\n" \
            "https://katalume.vercel.app/api/auth/providers" || true
          curl -sS -m 90 -o /dev/null -w "problems:  %{http_code} in %{time_total}s\n" \
            "https://katalume.vercel.app/api/problems" || true
